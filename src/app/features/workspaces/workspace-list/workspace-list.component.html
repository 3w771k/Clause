<div class="h-full overflow-y-auto p-8">
  <div class="max-w-3xl mx-auto">

    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-semibold text-gray-900">Espaces de travail</h1>
        <p class="text-sm text-gray-500 mt-1">Gérez vos espaces d'analyse juridique</p>
      </div>
      <button (click)="creating.set(true)"
        class="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
        </svg>
        Nouvel espace
      </button>
    </div>

    <!-- Create form -->
    @if (creating()) {
      <div class="bg-white border border-indigo-200 rounded-xl p-5 mb-6 shadow-sm">
        <h3 class="font-medium text-gray-900 mb-4">Nouvel espace de travail</h3>
        <div class="space-y-3">
          <input [(ngModel)]="newName" [ngModelOptions]="{standalone: true}" (input)="newName.set($any($event.target).value)"
            placeholder="Nom de l'espace *"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
          <input [(ngModel)]="newDesc" [ngModelOptions]="{standalone: true}" (input)="newDesc.set($any($event.target).value)"
            placeholder="Description (optionnel)"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
          <div class="flex gap-2 justify-end">
            <button (click)="creating.set(false)"
              class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900">Annuler</button>
            <button (click)="create()"
              class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700">Créer</button>
          </div>
        </div>
      </div>
    }

    <!-- List -->
    <div class="grid gap-3">
      @for (ws of workspaces(); track ws.id) {
        <button (click)="open(ws)"
          class="w-full text-left bg-white border border-gray-200 rounded-xl p-5 hover:border-indigo-300 hover:shadow-sm transition-all group">
          <div class="flex items-start justify-between">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-lg bg-indigo-50 flex items-center justify-center shrink-0">
                <svg class="w-5 h-5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/>
                </svg>
              </div>
              <div>
                <div class="font-medium text-gray-900 group-hover:text-indigo-700 transition-colors">{{ ws.name }}</div>
                @if (ws.description) {
                  <div class="text-sm text-gray-500 mt-0.5">{{ ws.description }}</div>
                }
              </div>
            </div>
            <div class="flex items-center gap-3 shrink-0 ml-4">
              <span class="text-xs text-gray-400">{{ formatDate(ws.createdAt) }}</span>
              <button (click)="deleteWorkspace(ws, $event)"
                class="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors opacity-0 group-hover:opacity-100">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/>
                </svg>
              </button>
            </div>
          </div>
        </button>
      }

      @if (workspaces().length === 0) {
        <div class="text-center py-12 text-gray-400">
          <svg class="w-12 h-12 mx-auto mb-3 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/>
          </svg>
          <p class="text-sm">Aucun espace de travail. Créez-en un pour commencer.</p>
        </div>
      }
    </div>
  </div>
</div>
